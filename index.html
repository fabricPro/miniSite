<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6750A4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Iplik Numara Cevirici</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-bar">
      <h1>Iplik Numara Cevirici</h1>
      <button id="clearBtn" class="icon-btn" title="Tumunu temizle" aria-label="Tumunu temizle">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M9 3v1H4v2h1l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14h1V4h-5V3H9zm2 5h2v10h-2V8zm-4 0h2v10H7V8zm8 0h2v10h-2V8z"/>
        </svg>
      </button>
    </header>

    <main class="converter">
      <section class="card">
        <h2 class="card-title">Numune</h2>
        <div class="grid-2">
          <label class="field">
            <span>Gramaj (g)</span>
            <input id="weight" type="number" inputmode="decimal" step="0.001" min="0" placeholder="0.000" autocomplete="off" />
          </label>
          <label class="field">
            <span>Uzunluk (cm)</span>
            <input id="length" type="number" inputmode="decimal" step="0.1" min="0" placeholder="0" autocomplete="off" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2 class="card-title">Numara</h2>
        <div class="grid-2">
          <label class="field">
            <span>Ne <small>(pamuk)</small></span>
            <input id="ne" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" autocomplete="off" />
          </label>
          <label class="field">
            <span>Nm <small>(metrik)</small></span>
            <input id="nm" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" autocomplete="off" />
          </label>
          <label class="field">
            <span>Denye <small>(den)</small></span>
            <input id="den" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" autocomplete="off" />
          </label>
          <label class="field">
            <span>dtex</span>
            <input id="dtex" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" autocomplete="off" />
          </label>
        </div>
      </section>

      <p class="hint">Gramaj + uzunluk girersen 4 numara otomatik hesaplanir. Numara alanlarindan birine yazarsan diger 3 numara guncellenir.</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
